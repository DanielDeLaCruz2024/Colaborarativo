<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Empresa — Contacto</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
    <div class="logo">MiEmpresa</div>
    <ul>
      <li><a href="index.html">Inicio</a></li>
      <li><a href="nosotros.html">Nosotros</a></li>
      <li><a href="servicios.html">Servicios</a></li>
      <li><a href="contacto.html" class="activo">Contacto</a></li>
    </ul>
  </nav>
 
  <section class="contacto">
    <h2>Contáctanos</h2>
    <p>Estamos listos para ayudarte. Escríbenos y te respondemos pronto.</p>
 
    <form class="formulario">
      <div>
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" placeholder="Tu nombre" required>
      </div>
<div>
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="tu@email.com" required>
      </div>
      <div>
        <label for="asunto">Asunto</label>
        <input type="text" id="asunto" placeholder="¿En qué podemos ayudarte?">
      </div>
      <div>
        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" rows="5"
                  placeholder="Cuéntanos sobre tu proyecto..."></textarea>
      </div>
      <button type="submit">Enviar mensaje</button>
    </form>
  </section>
 
  <footer>
    <p>©️ 2025 MiEmpresa. Todos los derechos reservados.</p>
  </footer>
 
</body>
</html>
